name: Перевірки / Checks

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Метадані та контракти / Metadata and contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Отримати код / Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Перевірити пробіли / Check whitespace
        shell: bash
        run: |
          if git grep -nI -E '[[:blank:]]+$' -- .; then
            echo "Знайдено кінцеві пробіли / Trailing whitespace found"
            exit 1
          fi

      - name: Перевірити JSON / Validate JSON
        shell: bash
        run: |
          for file in contracts/examples/*.json; do
            python3 -m json.tool "$file" >/dev/null
          done

      - name: Перевірити OpenAPI YAML / Validate OpenAPI YAML
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("contracts/openapi.yaml")
          content = path.read_text(encoding="utf-8")
          try:
              import yaml
          except ModuleNotFoundError:
              required_roots = ("openapi: 3.1.0", "info:", "paths:", "components:")
              missing = [item for item in required_roots if item not in content]
              if missing or "\t" in content:
                  raise SystemExit(
                      "OpenAPI structural validation failed: " + ", ".join(missing)
                  )
          else:
              document = yaml.safe_load(content)
              if not isinstance(document, dict):
                  raise SystemExit("OpenAPI root must be a mapping")
              if document.get("openapi") != "3.1.0":
                  raise SystemExit("OpenAPI version must be 3.1.0")
          PY

      - name: Перевірити політики каркаса / Validate scaffold policies
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          required = [
              "README.md",
              "CONTRIBUTING.md",
              "SECURITY.md",
              "docs/architecture.md",
              "docs/threat-model.md",
              "contracts/openapi.yaml",
              "contracts/examples/current-workload.json",
              ".env.example",
              "apps/android/gradlew",
              "apps/android/gradle/wrapper/gradle-wrapper.jar",
          ]
          missing = [path for path in required if not Path(path).is_file()]
          if missing:
              raise SystemExit(f"Missing required files: {', '.join(missing)}")

          readme = Path("README.md").read_text(encoding="utf-8")
          ua = readme.find("## Українська")
          en = readme.find("## English")
          if ua < 0 or en < 0 or ua >= en:
              raise SystemExit("README must contain the complete UA section before EN")

          public_docs = "\n".join(
              Path(path).read_text(encoding="utf-8")
              for path in [
                  "README.md",
                  "CONTRIBUTING.md",
                  "SECURITY.md",
                  "docs/architecture.md",
                  "docs/threat-model.md",
                  "contracts/openapi.yaml",
              ]
          )
          if "відкрите джерело" not in public_docs:
              raise SystemExit("UA source-neutral wording is missing")
          if "publicly accessible external source" not in public_docs:
              raise SystemExit("EN source-neutral wording is missing")

          env_values = {}
          for raw_line in Path(".env.example").read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              env_values[key] = value
          if int(env_values["POLL_INTERVAL_SECONDS"]) < 60:
              raise SystemExit("POLL_INTERVAL_SECONDS must be at least 60")
          if int(env_values["THRESHOLD_STEP"]) != 50:
              raise SystemExit("THRESHOLD_STEP must be 50 in the first milestone")

          example = json.loads(
              Path("contracts/examples/current-workload.json").read_text(encoding="utf-8")
          )
          expected_keys = {
              "locationId",
              "vehicleCount",
              "observedAt",
              "receivedAt",
              "freshness",
              "sequence",
          }
          if set(example) != expected_keys:
              raise SystemExit("Workload example does not match the API DTO")
          if not 0 <= example["vehicleCount"] <= 1_000_000:
              raise SystemExit("Example vehicleCount is outside the supported range")
          if example["freshness"] not in {"fresh", "stale", "unknown"}:
              raise SystemExit("Example freshness is invalid")

          openapi = Path("contracts/openapi.yaml").read_text(encoding="utf-8")
          for route in ("/v1/health:", "/v1/workload:"):
              if route not in openapi:
                  raise SystemExit(f"Missing OpenAPI route: {route}")
          PY

  api:
    name: Сервер / API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: avelren_test
          POSTGRES_PASSWORD: avelren_test
          POSTGRES_DB: avelren_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U avelren_test -d avelren_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://avelren_test:avelren_test@localhost:5432/avelren_test
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Отримати код / Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Встановити залежності / Install dependencies
        run: npm ci

      - name: Перевірити типи / Typecheck
        run: npm run typecheck

      - name: Запустити тести / Run tests
        run: npm test

      - name: Зібрати сервер / Build server
        run: npm run build

      - name: Перевірити production-залежності / Audit production dependencies
        run: npm audit --omit=dev

  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Отримати код / Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Запустити unit-тести / Run unit tests
        working-directory: apps/android
        run: ./gradlew --no-daemon test

  compose:
    name: Production Compose
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Отримати код / Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          # The cancellation mutation intentionally executes a historical
          # attached implementation; keep its source available in CI.
          fetch-depth: 0

      - name: Перевірити production Compose / Validate production Compose
        run: docker compose --env-file .env.production.example config --quiet

      - name: Перевірити file capability Caddy / Test Caddy file capability
        run: ./scripts/ci/caddy-file-capability.sh

      - name: Перевірити чисту ініціалізацію / Test clean initialization
        run: ./scripts/ci/production-compose-smoke.sh

  backup:
    name: PostgreSQL backup safety
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          # The safety test proves its negative mutation against historical
          # source, which is outside the default shallow checkout.
          fetch-depth: 0

      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck strace
          shellcheck scripts/backup/*.sh scripts/ci/secure-lock-test.sh scripts/ci/postgres-backup-diagnostics.sh scripts/ci/postgres-backup-test.sh scripts/ci/postgres-restore-test.sh scripts/ci/postgres-backup-auth-test.sh scripts/ci/postgres-backup-compose-cancel-test.sh scripts/ci/production-compose-smoke.sh

      - name: Bash syntax
        run: bash -n scripts/backup/*.sh scripts/ci/secure-lock-test.sh scripts/ci/postgres-backup-diagnostics.sh scripts/ci/postgres-backup-test.sh scripts/ci/postgres-restore-test.sh scripts/ci/postgres-backup-auth-test.sh scripts/ci/postgres-backup-compose-cancel-test.sh scripts/ci/production-compose-smoke.sh

      - name: Secure host-lock namespace tests
        run: timeout --signal=TERM --kill-after=5s 2m sudo ./scripts/ci/secure-lock-test.sh

      - name: Backup failure-path and safety tests
        id: backup_safety
        run: timeout --signal=TERM --kill-after=15s 5m ./scripts/ci/postgres-backup-test.sh

      - name: Validate sanitized backup diagnostics
        id: diagnostics_guard
        if: ${{ failure() && steps.backup_safety.outcome == 'failure' }}
        run: bash ./scripts/ci/postgres-backup-diagnostics.sh guard "$RUNNER_TEMP/postgres-backup-safety-diagnostics/report.txt"

      - name: Upload sanitized backup diagnostics
        if: ${{ failure() && steps.backup_safety.outcome == 'failure' && steps.diagnostics_guard.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: postgres-backup-safety-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/postgres-backup-safety-diagnostics/report.txt
          if-no-files-found: error
          retention-days: 7
          overwrite: false

      - name: PostgreSQL TCP and pgpass authentication tests
        run: sudo ./scripts/ci/postgres-backup-auth-test.sh

      - name: Перевірити маршрут і cleanup PostgreSQL restore / Test PostgreSQL restore route and cleanup
        run: timeout --signal=TERM --kill-after=15s 3m sudo ./scripts/ci/postgres-restore-test.sh

      - name: Secret scan
        shell: bash
        run: |
          if git grep -nI -E 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|gh[pousr]_[A-Za-z0-9_]{20,}|AIza[0-9A-Za-z_-]{35}|AKIA[0-9A-Z]{16}|"private_key"[[:space:]]*:' -- .; then
            echo 'Secret-like material found'
            exit 1
          fi

      - name: Diff check
        run: git diff --check
