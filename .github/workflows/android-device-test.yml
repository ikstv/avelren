name: Android APK для телефону / Android device test APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/android-device-test.yml'

permissions:
  contents: read

jobs:
  android-device-test:
    name: Android APK для телефону / Android device test APK
    runs-on: ubuntu-latest
    steps:
      - name: Отримати код / Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Перевірити референс запуску / Validate trigger ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Manual workflow dispatch is allowed only from main."
            exit 1
          fi

      - name: Зібрати device test APK / Build device test APK
        working-directory: apps/android
        run: |
          ./gradlew --no-daemon -PAVELREN_API_BASE_URL=https://api.bordersignal.pp.ua/ test lint assembleDebug
          test -f app/build/outputs/apk/debug/app-debug.apk
          test -s app/build/outputs/apk/debug/app-debug.apk
          unzip -t app/build/outputs/apk/debug/app-debug.apk
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/avelren-device-test.apk
          sha256sum dist/avelren-device-test.apk > dist/avelren-device-test.apk.sha256

      - name: Upload debug device-test APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: avelren-device-test-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/android/dist/avelren-device-test.apk
            apps/android/dist/avelren-device-test.apk.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
          overwrite: false
